services:
  app:
    build: .
    container_name: chatgpt2api-go
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      # 根密钥（必填，也可在 config.json 中设置）
      # CHATGPT2API_AUTH_KEY=your_secret_key

      # 传输模式: tls-client（默认）| curl-impersonate
      CHATGPT2API_UPSTREAM_TRANSPORT=tls-client

      # curl-impersonate 自动下载（仅 curl-impersonate 模式）
      CHATGPT2API_CURL_IMPERSONATE_AUTO_DOWNLOAD=1

      # TLS 客户端指纹（仅 tls-client 模式）
      # CHATGPT2API_TLS_PROFILE=chrome_146

      # 监听端口
      # CHATGPT2API_ADDR=:80

      # 基础 URL（用于图片 URL 构建，CDN 反代时需要）
      # CHATGPT2API_BASE_URL=https://your-domain.com
